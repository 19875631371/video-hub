<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoHub - Share Your Videos</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a0a;color:#f1f1f1;min-height:100vh}
    nav{background:#181818;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid #272727}
    .logo{font-size:22px;font-weight:700;color:#ff4444;cursor:pointer;display:flex;align-items:center;gap:8px}
    .logo svg{width:32px;height:32px}
    .nav-actions{display:flex;gap:12px;align-items:center}
    .search-box{background:#121212;border:1px solid #333;border-radius:20px;padding:8px 16px;color:#fff;font-size:14px;width:280px;outline:none;transition:border-color .3s}
    .search-box:focus{border-color:#ff4444}
    .search-box::placeholder{color:#888}
    .btn{background:#ff4444;color:#fff;border:none;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .3s}
    .btn:hover{background:#cc0000}
    .btn:disabled{background:#555;cursor:not-allowed}
    .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:200;justify-content:center;align-items:center}
    .modal-overlay.active{display:flex}
    .modal{background:#1e1e1e;border-radius:16px;padding:32px;width:90%;max-width:560px;border:1px solid #333;max-height:90vh;overflow-y:auto}
    .modal h2{font-size:20px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
    .close-btn{margin-left:auto;background:none;border:none;color:#888;font-size:28px;cursor:pointer}
    .close-btn:hover{color:#fff}
    .upload-zone{border:2px dashed #444;border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:16px}
    .upload-zone:hover,.upload-zone.dragover{border-color:#ff4444;background:rgba(255,68,68,.05)}
    .upload-zone svg{width:48px;height:48px;color:#888;margin-bottom:12px}
    .upload-zone p{color:#888;font-size:14px}
    .upload-zone .fn{color:#ff4444;font-weight:600;margin-top:8px;font-size:13px}
    .fg{margin-bottom:14px}
    .fg label{display:block;font-size:13px;color:#aaa;margin-bottom:6px}
    .fg input,.fg textarea{width:100%;background:#121212;border:1px solid #333;border-radius:8px;padding:10px 14px;color:#fff;font-size:14px;outline:none;transition:border-color .3s}
    .fg input:focus,.fg textarea:focus{border-color:#ff4444}
    .fg textarea{resize:vertical;min-height:60px}
    .btn-submit{width:100%;background:#ff4444;color:#fff;border:none;padding:12px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
    .btn-submit:hover{background:#cc0000}
    .btn-submit:disabled{background:#555;cursor:not-allowed}
    .pbar{display:none;margin-top:12px;background:#333;border-radius:8px;overflow:hidden;height:8px}
    .pbar.active{display:block}
    .pbar .fill{height:100%;background:linear-gradient(90deg,#ff4444,#ff8800);width:0%;transition:width .3s}
    .ptxt{font-size:12px;color:#888;margin-top:8px;text-align:center;display:none}
    .container{max-width:1400px;margin:0 auto;padding:24px}
    .vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-top:20px}
    .vc{background:#181818;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .3s,box-shadow .3s;border:1px solid #272727}
    .vc:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
    .vc .th{width:100%;aspect-ratio:16/9;background:#272727;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .vc .th video{width:100%;height:100%;object-fit:cover}
    .vc .th .pi{position:absolute;width:48px;height:48px;background:rgba(0,0,0,.7);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s}
    .vc:hover .th .pi{opacity:1}
    .vc .info{padding:12px}
    .vc .info h3{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .vc .info p{font-size:12px;color:#aaa}
    .wv{display:none}.wv.active{display:block}.hv.hidden{display:none}
    .wc{max-width:1100px;margin:0 auto;padding:20px}
    .vpw{width:100%;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden;margin-bottom:20px}
    .vpw video{width:100%;height:100%}
    .vm h1{font-size:22px;font-weight:700;margin-bottom:8px}
    .vm p{color:#aaa;font-size:14px;line-height:1.6}
    .bb{background:none;border:none;color:#ff4444;font-size:14px;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;gap:6px}
    .bb:hover{text-decoration:underline}
    .es{text-align:center;padding:80px 20px;color:#888}
    .es svg{width:80px;height:80px;margin-bottom:20px;opacity:.3}
    .es h2{font-size:20px;margin-bottom:8px;color:#ccc}
    .ld{text-align:center;padding:60px;color:#888}
    .ld .sp{width:40px;height:40px;border:3px solid #333;border-top-color:#ff4444;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#333;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:300;transition:transform .3s;border:1px solid #444;max-width:80%}
    .toast.show{transform:translateX(-50%) translateY(0)}
    .toast.error{background:#cc0000;border-color:#f00}
    .toast.success{background:#060;border-color:#0a0}
    .ib{background:#1a1a2e;border:1px solid #333;border-radius:12px;padding:16px 20px;margin-bottom:20px;font-size:13px;color:#aaa;line-height:1.6}
    .ib strong{color:#ff8800}
    @media(max-width:768px){.search-box{width:140px}.vg{grid-template-columns:1fr}nav{padding:0 12px}.container{padding:12px}.nav-actions{gap:8px}}
  </style>
</head>
<body>
<nav>
  <div class="logo" onclick="showHome()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19.1c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.43z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02" fill="currentColor"/></svg>
    VideoHub
  </div>
  <div class="nav-actions">
    <input class="search-box" placeholder="Search..." id="sInput" oninput="filterV()">
    <button class="btn" onclick="openUM()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Upload
    </button>
  </div>
</nav>

<div class="hv" id="hv">
  <div class="container">
    <div class="ib"><strong>Welcome!</strong> Videos stored on GitHub. Max 100MB per file. Everyone sees all uploaded videos!</div>
    <div id="ldS" class="ld"><div class="sp"></div><p>Loading videos...</p></div>
    <div id="vg" class="vg" style="display:none"></div>
    <div id="es" class="es" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M10 8l6 4-6 4V8z"/></svg>
      <h2>No videos yet</h2><p>Click Upload to share your first video!</p>
    </div>
  </div>
</div>

<div class="wv" id="wv">
  <div class="wc">
    <button class="bb" onclick="showHome()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>Back</button>
    <div class="vpw"><video id="player" controls></video></div>
    <div class="vm"><h1 id="wTitle"></h1><p id="wDesc"></p></div>
  </div>
</div>

<div class="modal-overlay" id="uModal">
  <div class="modal">
    <h2>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload Video
      <button class="close-btn" onclick="closeUM()">&times;</button>
    </h2>
    <div class="upload-zone" id="uZone" onclick="document.getElementById('fInput').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p>Click or drag video here</p>
      <p style="font-size:12px;color:#666;margin-top:4px">MP4/WebM/MOV (max 100MB)</p>
      <div class="fn" id="fName"></div>
    </div>
    <input type="file" id="fInput" accept="video/*" style="display:none" onchange="handleFS(this.files[0])">
    <div class="fg"><label>Title</label><input id="vTitle" placeholder="Video name..."></div>
    <div class="fg"><label>Description (optional)</label><textarea id="vDesc" placeholder="Describe..."></textarea></div>
    <div class="pbar" id="pbar"><div class="fill" id="pfill"></div></div>
    <div class="ptxt" id="ptxt"></div>
    <button class="btn-submit" id="sBtn" onclick="doUpload()" disabled>Upload</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const GH_API='https://api.github.com';
const OWNER='19875631371';
const REPO='video-hub';
let tk=(localStorage.getItem('gh_tk')||'').replace(/[^\x20-\x7E]/g,'');
let selFile=null,videos=[],uploading=false;

function ghH(auth){
  const h=new Headers({'Accept':'application/vnd.github+json','Content-Type':'application/json'});
  if(auth&&tk)h.set('Authorization','Bearer '+tk);
  return h;
}
async function ghGet(p){return fetch(GH_API+p,{headers:ghH(false)})}
async function ghPut(p,b){return fetch(GH_API+p,{method:'PUT',headers:ghH(true),body:JSON.stringify(b)})}

function askTk(){
  const t=prompt('Enter GitHub Token (for uploading videos):\n\nThe token is stored locally in your browser only.\n\nGet one at: https://github.com/settings/tokens\n(Create token with Contents read/write on video-hub repo)',tk||'');
  if(t===null)return false;
  const clean=t.replace(/[^\x20-\x7E]/g,'').trim();
  if(clean){tk=clean;localStorage.setItem('gh_tk',tk);showToast('Token saved!','success');return true}
  return false;
}

async function getList(){
  try{
    const r=await ghGet(`/repos/${OWNER}/${REPO}/contents/_data/videos.json`);
    if(r.status===404)return[];
    if(!r.ok)return[];
    const d=await r.json();
    return JSON.parse(atob(d.content));
  }catch(e){return[]}
}

async function saveList(list){
  const c=btoa(unescape(encodeURIComponent(JSON.stringify(list,null,2))));
  try{
    const r=await ghGet(`/repos/${OWNER}/${REPO}/contents/_data/videos.json`);
    if(r.status===200){const d=await r.json();return await ghPut(`/repos/${OWNER}/${REPO}/contents/_data/videos.json`,{message:'update videos',content:c,sha:d.sha})}
  }catch(e){}
  return await ghPut(`/repos/${OWNER}/${REPO}/contents/_data/videos.json`,{message:'create videos',content:c});
}

function rawUrl(fp){return `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${fp}`}
function fmtB(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function showToast(m,t=''){const e=document.getElementById('toast');e.textContent=m;e.className='toast '+t+' show';setTimeout(()=>e.className='toast',3000)}

function openUM(){if(!tk){if(!askTk())return}document.getElementById('uModal').classList.add('active')}
function closeUM(){if(uploading){if(!confirm('Cancel upload?'))return;uploading=false}document.getElementById('uModal').classList.remove('active');resetUF()}
function resetUF(){selFile=null;document.getElementById('fName').textContent='';document.getElementById('vTitle').value='';document.getElementById('vDesc').value='';document.getElementById('sBtn').disabled=true;document.getElementById('pbar').classList.remove('active');document.getElementById('pfill').style.width='0%';document.getElementById('ptxt').style.display='none'}

function handleFS(f){
  if(!f)return;
  if(f.size>100*1048576){showToast('Max 100MB!','error');return}
  selFile=f;
  document.getElementById('fName').textContent=f.name+' ('+fmtB(f.size)+')';
  if(!document.getElementById('vTitle').value)document.getElementById('vTitle').value=f.name.replace(/\.[^/.]+$/,'');
  document.getElementById('sBtn').disabled=false;
}

const z=document.getElementById('uZone');
z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('dragover')});
z.addEventListener('dragleave',()=>z.classList.remove('dragover'));
z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('dragover');if(e.dataTransfer.files.length)handleFS(e.dataTransfer.files[0])});

function filterV(){renderV(document.getElementById('sInput').value)}

function renderV(q=''){
  const g=document.getElementById('vg'),es=document.getElementById('es');
  const fl=q?videos.filter(v=>v.title.toLowerCase().includes(q.toLowerCase())):videos;
  if(!fl.length){g.style.display='none';es.style.display='block';return}
  es.style.display='none';g.style.display='grid';
  g.innerHTML=fl.map(v=>`<div class="vc" onclick="watchV('${v.id}')"><div class="th"><video src="${rawUrl(v.filePath)}" preload="metadata" muted></video><div class="pi"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="8 5 20 12 8 19"/></svg></div></div><div class="info"><h3>${esc(v.title)}</h3><p>${esc(v.description||'No description')} &middot; ${v.size||''}</p></div></div>`).join('');
}

function readB64(f){return new Promise((ok,no)=>{const r=new FileReader();r.onload=()=>ok(r.result.split(',')[1]);r.onerror=no;r.readAsDataURL(f)})}

async function doUpload(){
  if(!selFile||uploading)return;
  if(!tk){if(!askTk())return}
  uploading=true;
  const btn=document.getElementById('sBtn'),pb=document.getElementById('pbar'),pf=document.getElementById('pfill'),pt=document.getElementById('ptxt');
  btn.disabled=true;btn.textContent='Uploading...';pb.classList.add('active');pt.style.display='block';

  try{
    pt.textContent='Reading file...';pf.style.width='10%';
    const b64=await readB64(selFile);
    pf.style.width='30%';

    const id='v_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
    const ext=(selFile.name||'video.mp4').split('.').pop().toLowerCase();
    pt.textContent='Uploading to GitHub...';pf.style.width='50%';

    const fr=await ghPut(`/repos/${OWNER}/${REPO}/contents/videos/${id}.${ext}`,{message:'upload video '+id,content:b64});
    if(!fr.ok){const e=await fr.json();throw new Error(e.message||'Upload failed')}
    pf.style.width='80%';

    const videos_copy=await getList();
    videos_copy.unshift({id,title:document.getElementById('vTitle').value||'Untitled',description:document.getElementById('vDesc').value||'',fileName:selFile.name,size:fmtB(selFile.size),filePath:`videos/${id}.${ext}`,mimeType:selFile.type||'video/mp4',createdAt:new Date().toISOString()});

    pt.textContent='Saving video list...';pf.style.width='90%';
    await saveList(videos_copy);

    pf.style.width='100%';showToast('Upload success!','success');
    closeUM();videos=videos_copy;renderV();
  }catch(e){
    showToast('Error: '+e.message,'error');
  }finally{
    uploading=false;btn.disabled=false;btn.textContent='Upload';pb.classList.remove('active');pf.style.width='0%';pt.style.display='none';
  }
}

function watchV(id){
  const v=videos.find(x=>x.id===id);if(!v)return;
  document.getElementById('hv').classList.add('hidden');
  document.getElementById('wv').classList.add('active');
  document.getElementById('wTitle').textContent=v.title;
  document.getElementById('wDesc').textContent=v.description||'';
  const p=document.getElementById('player');
  p.src=rawUrl(v.filePath);
  p.play().catch(()=>{});
  window.scrollTo(0,0);
}

function showHome(){
  document.getElementById('wv').classList.remove('active');
  document.getElementById('hv').classList.remove('hidden');
  const p=document.getElementById('player');p.pause();p.src='';
}

// Init
(async()=>{
  videos=await getList();
  document.getElementById('ldS').style.display='none';
  renderV();
})();
</script>
</body>
</html>
